<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stockfish 18 - Sandbox God Mode</title>
    <!-- jQuery & Chessboard.js -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #1e1e1e; color: #fff; display: flex; flex-direction: column; align-items: center; }
        h2 { margin-bottom: 20px; color: #4caf50; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; width: 100%; max-width: 1000px; justify-content: center; }
        .controls { padding: 20px; background: #2d2d2d; border-radius: 8px; flex: 1; min-width: 300px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .board-container { flex: 1; min-width: 400px; }
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        button, select { padding: 10px 15px; margin: 5px 5px 5px 0; font-size: 14px; cursor: pointer; border: none; border-radius: 4px; transition: background 0.2s; }
        button { background: #444; color: #fff; }
        button:hover { background: #555; }
        .primary-btn { background: #4caf50; font-weight: bold; width: 100%; margin-top: 10px; }
        .primary-btn:hover { background: #45a049; }
        .warning { color: #ffb86c; font-size: 14px; margin-top: 15px; border-top: 1px solid #444; padding-top: 10px; line-height: 1.4; }
        .castling-controls { margin: 10px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .castling-controls label { font-size: 12px; font-weight: normal; display: flex; align-items: center; }
        .castling-controls input { margin-right: 8px; }
        #fen-display { font-family: monospace; font-size: 12px; background: #000; padding: 10px; border-radius: 4px; word-break: break-all; margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>
    <h2>Stockfish 18 God Mode</h2>
    <div class="container">
        <div class="controls">
            <div class="control-group">
                <label for="sf-color">Stockfish to move as:</label>
                <select id="sf-color" style="width: 100%;">
                    <option value="b">Black</option>
                    <option value="w">White</option>
                </select>
            </div>

            <div class="control-group">
                <label>Castling Rights:</label>
                <div class="castling-controls">
                    <label><input type="checkbox" id="cwK" checked> White O-O</label>
                    <label><input type="checkbox" id="cwQ" checked> White O-O-O</label>
                    <label><input type="checkbox" id="cbK" checked> Black O-O</label>
                    <label><input type="checkbox" id="cbQ" checked> Black O-O-O</label>
                </div>
            </div>

            <button onclick="requestStockfishMove()" class="primary-btn">Ask Stockfish for Move</button>
            <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                <button onclick="board.start()" style="flex: 1;">Reset</button>
                <button onclick="board.clear()" style="flex: 1;">Clear</button>
                <button onclick="board.flip()" style="flex: 1;">Flip</button>
            </div>

            <div id="fen-display">FEN: rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1</div>

            <div class="warning">
                <b>Sandbox Rules:</b> Drag pieces anywhere. Throw them off the board to remove them. Use spare pieces to add more. When ready, ask Stockfish to make the next move based on your custom setup.
            </div>
        </div>

        <div class="board-container">
            <div id="board" style="width: 100%; max-width: 600px"></div>
        </div>
    </div>

    <script>
        var board = Chessboard('board', {
            draggable: true,
            dropOffBoard: 'trash',
            sparePieces: true,
            position: 'start',
            pieceTheme: '/static/img/chesspieces/wikipedia/{piece}.png',
            onChange: updateFenDisplay
        });

        function updateFenDisplay() {
            setTimeout(() => {
                var sfColor = document.getElementById('sf-color').value;
                var partialFen = board.fen();
                var castling = getCastlingString();
                var fullFen = partialFen + " " + sfColor + " " + castling + " - 0 1";
                document.getElementById('fen-display').innerText = "FEN: " + fullFen;
            }, 100);
        }

        document.getElementById('sf-color').addEventListener('change', updateFenDisplay);
        document.querySelectorAll('.castling-controls input').forEach(el => el.addEventListener('change', updateFenDisplay));

        function getCastlingString() {
            let res = "";
            if (document.getElementById('cwK').checked) res += "K";
            if (document.getElementById('cwQ').checked) res += "Q";
            if (document.getElementById('cbK').checked) res += "k";
            if (document.getElementById('cbQ').checked) res += "q";
            return res || "-";
        }

        function requestStockfishMove() {
            var sfColor = document.getElementById('sf-color').value;
            var partialFen = board.fen();
            var castling = getCastlingString();
            var fullFen = partialFen + " " + sfColor + " " + castling + " - 0 1";

            fetch('/move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fen: fullFen })
            })
            .then(res => res.json())
            .then(data => {
                if (!data.move || data.move === '(none)') {
                    alert("Stockfish refused to move! Ensure each side has exactly 1 King and no pawns are trapped on the 1st/8th ranks.");
                    return;
                }

                let move = data.move;
                let from = move.substring(0, 2);
                let to = move.substring(2, 4);
                let promo = move.length > 4 ? move.substring(4, 5) : null;

                board.move(from + '-' + to);

                if (promo) {
                    setTimeout(() => {
                        let pos = board.position();
                        pos[to] = (sfColor === 'w' ? 'w' : 'b') + promo.toUpperCase();
                        board.position(pos);
                    }, 250);
                }
            })
            .catch(err => {
                console.error(err);
                alert("Error communicating with the server.");
            });
        }
    </script>
</body>
</html>
